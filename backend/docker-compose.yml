# version: '3.8'

services:
  # 1. Vector Database Service
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vector-db
    ports:
      - "6333:6333" # gRPC API Port
      - "6334:6334" # REST API Port
    volumes:
      - ./qdrant_data:/qdrant/storage # Persists the vector index on your local disk
    restart: always

  # 2. Relational Database Service
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    env_file:
      - .env 
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432" # Exposes Postgres to your local machine for development
    volumes:
      - ./postgres_data:/var/lib/postgresql/data # Persists the database data
    restart: always

  # 3. Zookeeper (Required for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    user: "0:0" 
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  # 4. Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    user: "0:0"
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      - kafka
    # This command pings Kafka until it's awake, then creates the topics, then exits.
    command: >
      bash -c "
      echo 'Waiting for Kafka to be ready...' &&
      cub kafka-ready -b kafka:29092 1 30 &&
      echo 'Kafka is ready. Creating topics...' &&
      kafka-topics --create --if-not-exists --topic raw_emails --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 &&
      kafka-topics --create --if-not-exists --topic bulk_actions --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 &&
      echo 'Topics created successfully.'
      "
    
  # 5. Spark Master Node
  # spark-master:
  #   image: apache/spark:3.5.1
  #   container_name: spark-master
  #   ports:
  #     - "8080:8080" # Spark Web UI
  #     - "7077:7077" # Spark Master port
  #   command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master

  # 5. Spark Master Node
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: aethermail-spark:latest
    container_name: spark-master

    ports:
      - "8080:8080"
      - "7077:7077"

    volumes:
      - ./:/app

    working_dir: /app

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host spark-master

  # 6. Spark Worker Node
  # spark-worker:
  #   image: apache/spark:3.5.1
  #   container_name: spark-worker
  #   depends_on:
  #     - spark-master
  #   command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    # 6. Spark Worker Node
  spark-worker:
    image: aethermail-spark:latest
    container_name: spark-worker

    depends_on:
      - spark-master

    volumes:
      - ./:/app

    working_dir: /app

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

# Named volumes for data persistence
volumes:
  postgres_data:
  qdrant_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log: